version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - config/.env
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - config/.env
    depends_on:
      - redis

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
